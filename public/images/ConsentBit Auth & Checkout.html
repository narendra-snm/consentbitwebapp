<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ConsentBit — Auth & Checkout</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: #f0eee9; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="checkout.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <>
          <CBThemeSwitcher />
          <DesignCanvas>
            <DCSection id="checkout" title="Checkout" subtitle="Four-step single-page flow with right-rail summary">
              <DCArtboard id="checkout-v1" label="Checkout · Full page" width={1000} height={1640}>
                <CheckoutV1 />
              </DCArtboard>
              <DCArtboard id="checkout-v2" label="Checkout · Success modal" width={1000} height={1640}>
                <CheckoutV2 />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
